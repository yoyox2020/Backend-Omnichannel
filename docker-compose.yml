version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: omnichannel_backend:latest
    container_name: omnichannel_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      API_PORT: 3001
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: itsm_user
      DB_PASSWORD: "Pakubumi2020#"
      DB_NAME: itsm_ai
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      JWT_SECRET: "replace_with_a_secret"
      JWT_REFRESH_SECRET: "replace_with_a_refresh_secret"
      CORS_ORIGIN: "http://localhost:3000"
      NODE_ENV: production
