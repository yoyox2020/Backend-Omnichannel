version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnichannel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itsm_user
      POSTGRES_PASSWORD: "Pakubumi2020#"
      POSTGRES_DB: itsm_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsm_user -d itsm_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: omnichannel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
